<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>岱德楼</title>
    <meta name="description" content="这里写你教学楼的历史或者介绍">
    <meta name="keyword" content="XX教学楼，XX大学，XX路">
    <style type="text/css">
        #tit {font-size: 30px }
        .imgBox {
            width: 500px;
            height: 400px;
            text-align: center;
            margin: 0 auto;
            border: aquamarine solid 1px;
        }
        .imgBox #building {
            width: 500px;
            height: 400px;
        }

        p{ text-indent:2em;
            width: 100%;
            height: auto;
            word-wrap:break-word;
            word-break:break-all;
            overflow: hidden; }
    </style>
</head>
<body>
    <div class="text">
        <p id="tit" style="text-align:center">岱德楼</p>
        <hr>
        <p>
            这里写一些你们学校的简介，然后最后一句话引出你们这个教学楼
        </p>
        <div class="imgBox">
            <img id="building" style="margin: 0 auto" src="./img/bea.jpg" alt="meinv">
        </div>
        <p>
            这里写教学楼的简介，然后如果想修改图片的大小，修改上边.imgBox #building 里边的width 和 height的数字就可以了，然后关于图片，你在这个html所在文件夹下，新建一个
            文件夹，文件夹的名字叫img，然后把你的教学楼的图片放在img文件夹下，修改一下img标签里的src="./img/bea.jpg"，，，把bea.jpg换成你的图片的名字，然后把alt="meinv"
            里的meinv换成你的图片名字
        </p>
    </div>
</body>
</html>
